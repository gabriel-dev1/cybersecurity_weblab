<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div>
            <h1>Contato</h1>
            <div id="state"> 
            </div>
        </div>
    </header>

    <main class="flex">
        <div>
          <form id="formContato" action="">
            <label for="name">Seu nome:</label>
            <div>
                <input id="name" type="text">
            </div>
            <label for="name">Seu email:</label>
            <div>
                <input id="email" type="email">
            </div>
            <label for="message">Sua mensagem:</label>
            <div>
                <textarea rows="10" class="text" name="" id="message"></textarea>
            </div>
            <button id="buttonForm" class="buttons" type="submit">Enviar</button>
            <p id="mensagemErro" style="color: red; display: none;"></p>
          </form>
        </div>
    </main>

    <script src="./js/script.js"></script>
</body>
</html>
